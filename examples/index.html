<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mosp.js Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="main-content">
      <div class="video-section">
        <div id="videoContainer">
          <video id="videoElement"></video>

          <div class="debug-panel" id="debugPanel">
            <h3>时间戳调试</h3>
            <div class="debug-grid">
              <div class="debug-item">
                <span class="debug-label">视频时间戳</span>
                <span class="debug-value" id="videoTimestamp">--</span>
              </div>
              <div class="debug-item">
                <span class="debug-label">SEI 时间戳</span>
                <span class="debug-value" id="seiTimestamp">--</span>
              </div>
              <div class="debug-item">
                <span class="debug-label">差值</span>
                <span class="debug-value" id="timestampDiff">--</span>
              </div>
              <div class="debug-item">
                <span class="debug-label">命中/缓冲帧数</span>
                <span class="debug-value" id="bufferedFrames">--/--</span>
              </div>
              <div class="debug-item">
                <span class="debug-label">第一帧时间戳</span>
                <span class="debug-value" id="firstBufferedTimestamp">--</span>
              </div>
              <div class="debug-item">
                <span class="debug-label">最后一帧时间戳</span>
                <span class="debug-value" id="lastBufferedTimestamp">--</span>
              </div>
            </div>
          </div>
        </div>

        <div class="player-controls">
          <button id="playBtn">播放</button>
          <button id="pauseBtn">暂停</button>
          <button id="stopBtn">停止</button>
          <button id="fullscreenBtn">全屏</button>
          <button id="destroyBtn">销毁播放器</button>
          <button id="toggleDebugBtn">关闭调试面板</button>
          <input
            type="text"
            id="streamUrl"
            placeholder="输入 MPEG-TS 流地址"
            value="http://192.168.88.91:7777/live/livestream1.live.ts"
          >
        </div>
      </div>

      <div class="control-panel">
        <h2>渲染配置</h2>

        <div class="control-group">
          <h3>标签字段</h3>
          <div class="checkbox-group">
            <label>
              <input type="checkbox" id="showObjectId" checked>
              显示对象 ID
            </label>
            <label>
              <input type="checkbox" id="showType" checked>
              显示类型
            </label>
            <label>
              <input type="checkbox" id="showConfidence" checked>
              显示置信度
            </label>
            <label>
              <input type="checkbox" id="showItemDuration">
              显示 Item Duration
            </label>
          </div>

          <div class="slider-control">
            <div class="slider-control-header">
              <label for="globalLineWidth">线宽</label>
              <span class="value-display" id="globalLineWidthValue">2</span>
            </div>
            <input type="range" id="globalLineWidth" min="1" max="10" value="2">
          </div>

          <div class="slider-control">
            <div class="slider-control-header">
              <label for="maxDetectionFrames">最大检测帧缓存</label>
              <span class="value-display" id="maxDetectionFramesValue">400</span>
            </div>
            <input type="range" id="maxDetectionFrames" min="100" max="1000" step="10" value="400">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="mpegts.js"></script>
  <script src="../dist/mosp.js"></script>

  <script>
    (function() {
      const videoElement = document.getElementById('videoElement');
      const streamUrlInput = document.getElementById('streamUrl');
      const playBtn = document.getElementById('playBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const stopBtn = document.getElementById('stopBtn');
      const fullscreenBtn = document.getElementById('fullscreenBtn');
      const destroyBtn = document.getElementById('destroyBtn');
      const toggleDebugBtn = document.getElementById('toggleDebugBtn');
      const videoContainer = document.getElementById('videoContainer');
      const debugPanel = document.getElementById('debugPanel');
      const globalLineWidth = document.getElementById('globalLineWidth');
      const globalLineWidthValue = document.getElementById('globalLineWidthValue');
      const maxDetectionFrames = document.getElementById('maxDetectionFrames');
      const maxDetectionFramesValue = document.getElementById('maxDetectionFramesValue');
      const showObjectId = document.getElementById('showObjectId');
      const showType = document.getElementById('showType');
      const showConfidence = document.getElementById('showConfidence');
      const showItemDuration = document.getElementById('showItemDuration');
      const videoTimestamp = document.getElementById('videoTimestamp');
      const seiTimestamp = document.getElementById('seiTimestamp');
      const timestampDiff = document.getElementById('timestampDiff');
      const bufferedFrames = document.getElementById('bufferedFrames');
      const firstBufferedTimestamp = document.getElementById('firstBufferedTimestamp');
      const lastBufferedTimestamp = document.getElementById('lastBufferedTimestamp');

      let player = null;
      let currentUrl = '';
      let debugPanelRafId = null;
      let debugPanelVisible = true;

      const overlay = new mosp.MOSPOverlay({
        maxDetectionFrames: 400,
        lineWidth: 2,
        labelFields: ['object_id', 'type', 'confidence']
      });

      overlay.attachMedia(videoElement);

      function resetOverlayData() {
        overlay.clear();
      }

      function updateLabelFields() {
        const fields = [];
        if (showObjectId.checked) fields.push('object_id');
        if (showType.checked) fields.push('type');
        if (showConfidence.checked) fields.push('confidence');
        if (showItemDuration.checked) fields.push('item_duration');
        overlay.configure({ labelFields: fields });
      }

      function formatTimestamp(ms) {
        if (typeof ms !== 'number' || !Number.isFinite(ms)) {
          return '--';
        }

        const totalMs = Math.max(0, Math.floor(ms));
        const hours = Math.floor(totalMs / 3600000);
        const minutes = Math.floor((totalMs % 3600000) / 60000);
        const seconds = Math.floor((totalMs % 60000) / 1000);
        const millis = totalMs % 1000;

        const pad2 = (v) => v.toString().padStart(2, '0');
        const pad3 = (v) => v.toString().padStart(3, '0');

        return `${pad2(hours)}:${pad2(minutes)}:${pad2(seconds)}.${pad3(millis)}`;
      }

      function formatDiff(ms) {
        if (typeof ms !== 'number' || !Number.isFinite(ms)) {
          return '--';
        }

        return (ms >= 0 ? '+' : '') + ms.toFixed(1) + ' ms';
      }

      function renderDebugPanel() {
        const debugInfo = overlay.getDebugInfo();
        const matchedFramesText = debugInfo.matchedFrameIndex === null
          ? `--/${debugInfo.bufferedFrames}`
          : `${debugInfo.matchedFrameIndex}/${debugInfo.bufferedFrames}`;

        videoTimestamp.textContent = formatTimestamp(debugInfo.videoCurrentTimeMs);
        seiTimestamp.textContent = formatTimestamp(debugInfo.seiPtsMs);
        timestampDiff.textContent = formatDiff(debugInfo.diffMs);
        bufferedFrames.textContent = matchedFramesText;
        firstBufferedTimestamp.textContent = formatTimestamp(debugInfo.firstBufferedPtsMs);
        lastBufferedTimestamp.textContent = formatTimestamp(debugInfo.lastBufferedPtsMs);
        debugPanelRafId = requestAnimationFrame(renderDebugPanel);
      }

      function startDebugPanel() {
        if (debugPanelRafId !== null) {
          return;
        }

        renderDebugPanel();
      }

      function stopDebugPanel() {
        if (debugPanelRafId === null) {
          return;
        }

        cancelAnimationFrame(debugPanelRafId);
        debugPanelRafId = null;
      }

      function updateDebugToggleButton() {
        toggleDebugBtn.textContent = debugPanelVisible ? '关闭调试面板' : '打开调试面板';
      }

      function setDebugPanelVisible(visible) {
        debugPanelVisible = visible;
        debugPanel.classList.toggle('hidden', !visible);
        updateDebugToggleButton();
      }

      function getFullscreenElement() {
        return document.fullscreenElement || document.webkitFullscreenElement || null;
      }

      function isVideoContainerFullscreen() {
        return getFullscreenElement() === videoContainer;
      }

      function updateFullscreenButton() {
        fullscreenBtn.textContent = isVideoContainerFullscreen() ? '退出全屏' : '全屏';
      }

      function requestContainerFullscreen() {
        if (videoContainer.requestFullscreen) {
          return videoContainer.requestFullscreen();
        }

        if (videoContainer.webkitRequestFullscreen) {
          return videoContainer.webkitRequestFullscreen();
        }

        return Promise.reject(new Error('Fullscreen API is not supported'));
      }

      function exitFullscreen() {
        if (document.exitFullscreen) {
          return document.exitFullscreen();
        }

        if (document.webkitExitFullscreen) {
          return document.webkitExitFullscreen();
        }

        return Promise.reject(new Error('Fullscreen exit is not supported'));
      }

      function destroyPlayer() {
        if (!player) {
          return;
        }

        player.destroy();
        player = null;
      }

      function createPlayer(url) {
        player = mpegts.createPlayer({
          type: 'mse',
          enableWorker: true,
          lazyLoadMaxDuration: 3 * 60,
          seekType: 'range',
          liveBufferLatencyChasing: true,
          isLive: true,
          url
        });

        player.attachMediaElement(videoElement);

        player.on(mpegts.Events.ERROR, function(errorType, errorDetail, errorInfo) {
          console.error('Player error:', errorType, errorDetail, errorInfo);
        });

        player.on(mpegts.Events.MEDIA_INFO, function(mediaInfo) {
          console.log('Media info:', mediaInfo);
        });

        player.on(mpegts.Events.SEI_ARRIVED, function(data) {
          overlay.pushData(data);
        });

        player.load();
        currentUrl = url;
      }

      playBtn.onclick = function() {
        const url = streamUrlInput.value.trim();

        if (!url) {
          alert('请输入流地址');
          return;
        }

        if (typeof mpegts === 'undefined') {
          alert('mpegts.js 未加载，请检查示例文件');
          return;
        }

        if (!mpegts.getFeatureList().mseLivePlayback) {
          alert('当前浏览器不支持 MSE');
          return;
        }

        if (player || currentUrl !== url) {
          destroyPlayer();
          resetOverlayData();
          createPlayer(url);
        }

        player.play();
        overlay.show();
      };

      pauseBtn.onclick = function() {
        if (!player) {
          return;
        }

        player.pause();
      };

      stopBtn.onclick = function() {
        if (!player) {
          return;
        }

        player.pause();
        player.unload();
        resetOverlayData();
        currentUrl = '';
      };

      fullscreenBtn.onclick = function() {
        const action = isVideoContainerFullscreen() ? exitFullscreen() : requestContainerFullscreen();

        Promise.resolve(action).catch(function(error) {
          console.error('Fullscreen error:', error);
          alert('当前环境不支持全屏或切换失败');
        });
      };

      destroyBtn.onclick = function() {
        destroyPlayer();
        resetOverlayData();
        currentUrl = '';
      };

      toggleDebugBtn.onclick = function() {
        setDebugPanelVisible(!debugPanelVisible);
      };

      globalLineWidth.oninput = function(event) {
        globalLineWidthValue.textContent = event.target.value;
        overlay.configure({ lineWidth: parseInt(event.target.value, 10) });
      };

      maxDetectionFrames.oninput = function(event) {
        maxDetectionFramesValue.textContent = event.target.value;
        overlay.configure({ maxDetectionFrames: parseInt(event.target.value, 10) });
      };

      showObjectId.onchange = updateLabelFields;
      showType.onchange = updateLabelFields;
      showConfidence.onchange = updateLabelFields;
      showItemDuration.onchange = updateLabelFields;

      document.addEventListener('fullscreenchange', function() {
        updateFullscreenButton();
        window.dispatchEvent(new Event('resize'));
      });

      document.addEventListener('webkitfullscreenchange', function() {
        updateFullscreenButton();
        window.dispatchEvent(new Event('resize'));
      });

      window.addEventListener('beforeunload', function() {
        stopDebugPanel();
        destroyPlayer();
        overlay.detachMedia();
      });

      updateLabelFields();
      globalLineWidthValue.textContent = globalLineWidth.value;
      maxDetectionFramesValue.textContent = maxDetectionFrames.value;
      updateFullscreenButton();
      setDebugPanelVisible(true);
      startDebugPanel();
    })();
  </script>
</body>
</html>
