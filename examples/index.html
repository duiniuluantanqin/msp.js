<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>msp.js Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="main-content">
      <div class="video-section">
        <div id="videoContainer">
          <video id="videoElement"></video>
        </div>

        <div class="player-controls">
          <button id="playBtn">播放</button>
          <button id="pauseBtn">暂停</button>
          <button id="stopBtn">停止</button>
          <button id="fullscreenBtn">全屏</button>
          <button id="destroyBtn">销毁播放器</button>
          <input
            type="text"
            id="streamUrl"
            placeholder="输入 MPEG-TS 流地址"
            value="http://192.168.88.91:7777/live/livestream1.live.ts"
          >
        </div>
      </div>

      <div class="control-panel">
        <h2>渲染配置</h2>

        <div class="control-group">
          <h3>标签字段</h3>
          <div class="checkbox-group">
            <label>
              <input type="checkbox" id="showObjectId" checked>
              显示对象 ID
            </label>
            <label>
              <input type="checkbox" id="showType" checked>
              显示类型
            </label>
            <label>
              <input type="checkbox" id="showConfidence" checked>
              显示置信度
            </label>
          </div>

          <div class="slider-control">
            <div class="slider-control-header">
              <label for="globalLineWidth">线宽</label>
              <span class="value-display" id="globalLineWidthValue">2</span>
            </div>
            <input type="range" id="globalLineWidth" min="1" max="10" value="2">
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="mpegts.js"></script>
  <script src="../dist/msp.js"></script>

  <script>
    (function() {
      const videoElement = document.getElementById('videoElement');
      const streamUrlInput = document.getElementById('streamUrl');
      const playBtn = document.getElementById('playBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const stopBtn = document.getElementById('stopBtn');
      const fullscreenBtn = document.getElementById('fullscreenBtn');
      const destroyBtn = document.getElementById('destroyBtn');
      const videoContainer = document.getElementById('videoContainer');
      const globalLineWidth = document.getElementById('globalLineWidth');
      const globalLineWidthValue = document.getElementById('globalLineWidthValue');
      const showObjectId = document.getElementById('showObjectId');
      const showType = document.getElementById('showType');
      const showConfidence = document.getElementById('showConfidence');

      let player = null;
      let currentUrl = '';

      const overlay = new msp.MSPOverlay({
        maxDetectionFrames: 100,
        lineWidth: 2,
        labelFields: ['object_id', 'type', 'confidence']
      });

      overlay.attachMedia(videoElement);

      function resetOverlayData() {
        overlay.clear();
      }

      function updateLabelFields() {
        const fields = [];
        if (showObjectId.checked) fields.push('object_id');
        if (showType.checked) fields.push('type');
        if (showConfidence.checked) fields.push('confidence');
        overlay.configure({ labelFields: fields });
      }

      function getFullscreenElement() {
        return document.fullscreenElement || document.webkitFullscreenElement || null;
      }

      function isVideoContainerFullscreen() {
        return getFullscreenElement() === videoContainer;
      }

      function updateFullscreenButton() {
        fullscreenBtn.textContent = isVideoContainerFullscreen() ? '退出全屏' : '全屏';
      }

      function requestContainerFullscreen() {
        if (videoContainer.requestFullscreen) {
          return videoContainer.requestFullscreen();
        }

        if (videoContainer.webkitRequestFullscreen) {
          return videoContainer.webkitRequestFullscreen();
        }

        return Promise.reject(new Error('Fullscreen API is not supported'));
      }

      function exitFullscreen() {
        if (document.exitFullscreen) {
          return document.exitFullscreen();
        }

        if (document.webkitExitFullscreen) {
          return document.webkitExitFullscreen();
        }

        return Promise.reject(new Error('Fullscreen exit is not supported'));
      }

      function destroyPlayer() {
        if (!player) {
          return;
        }

        player.destroy();
        player = null;
      }

      function createPlayer(url) {
        player = mpegts.createPlayer({
          type: 'mse',
          isLive: true,
          url
        });

        player.attachMediaElement(videoElement);

        player.on(mpegts.Events.ERROR, function(errorType, errorDetail, errorInfo) {
          console.error('Player error:', errorType, errorDetail, errorInfo);
        });

        player.on(mpegts.Events.MEDIA_INFO, function(mediaInfo) {
          console.log('Media info:', mediaInfo);
        });

        player.on(mpegts.Events.SEI_ARRIVED, function(data) {
          overlay.pushData(data);
        });

        player.load();
        currentUrl = url;
      }

      playBtn.onclick = function() {
        const url = streamUrlInput.value.trim();

        if (!url) {
          alert('请输入流地址');
          return;
        }

        if (typeof mpegts === 'undefined') {
          alert('mpegts.js 未加载，请检查示例文件');
          return;
        }

        if (!mpegts.getFeatureList().mseLivePlayback) {
          alert('当前浏览器不支持 MSE');
          return;
        }

        if (!player || currentUrl !== url) {
          destroyPlayer();
          resetOverlayData();
          createPlayer(url);
        }

        player.play();
        overlay.show();
      };

      pauseBtn.onclick = function() {
        if (!player) {
          return;
        }

        player.pause();
      };

      stopBtn.onclick = function() {
        if (!player) {
          return;
        }

        player.pause();
        player.unload();
        resetOverlayData();
        currentUrl = '';
      };

      fullscreenBtn.onclick = function() {
        const action = isVideoContainerFullscreen() ? exitFullscreen() : requestContainerFullscreen();

        Promise.resolve(action).catch(function(error) {
          console.error('Fullscreen error:', error);
          alert('当前环境不支持全屏或切换失败');
        });
      };

      destroyBtn.onclick = function() {
        destroyPlayer();
        resetOverlayData();
        currentUrl = '';
      };

      globalLineWidth.oninput = function(event) {
        globalLineWidthValue.textContent = event.target.value;
        overlay.configure({ lineWidth: parseInt(event.target.value, 10) });
      };

      showObjectId.onchange = updateLabelFields;
      showType.onchange = updateLabelFields;
      showConfidence.onchange = updateLabelFields;

      document.addEventListener('fullscreenchange', function() {
        updateFullscreenButton();
        window.dispatchEvent(new Event('resize'));
      });

      document.addEventListener('webkitfullscreenchange', function() {
        updateFullscreenButton();
        window.dispatchEvent(new Event('resize'));
      });

      window.addEventListener('beforeunload', function() {
        destroyPlayer();
        overlay.detachMedia();
      });

      updateLabelFields();
      globalLineWidthValue.textContent = globalLineWidth.value;
      updateFullscreenButton();
    })();
  </script>
</body>
</html>
